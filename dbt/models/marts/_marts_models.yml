version: 2

models:
  - name: dim_teams
    description: "Team dimension with domain classification and SLA tier."
    columns:
      - name: team
        tests: [not_null]
      - name: model_name
        tests: [not_null]
      - name: sla_tier
        tests:
          - accepted_values:
              arguments:
                values: ["tier-1", "tier-2"]

  - name: fct_deployments
    description: "One row per software deployment with lead time."
    columns:
      - name: deployment_id
        tests: [unique, not_null]
      - name: team
        tests: [not_null]
      - name: lead_time_days
        tests: [not_null]

  - name: fct_incidents
    description: "One row per incident with MTTR. Open incidents included (closed_at nullable)."
    columns:
      - name: incident_id
        tests: [unique, not_null]
      - name: team
        tests: [not_null]
      - name: opened_at
        tests: [not_null]

  - name: fct_ml_runs
    description: "One row per model training run with time-to-deploy and drift signals."
    columns:
      - name: run_id
        tests: [unique, not_null]
      - name: team
        tests: [not_null]
      - name: model_name
        tests: [not_null]
      - name: psi_severity
        tests:
          - accepted_values:
              arguments:
                values: ["stable", "warning", "critical"]

  - name: fct_platform_health_daily
    description: >
      Composite platform health score per team per day. One row per team × day.
      Schema is contract-enforced — downstream consumers (Evidence dashboard) rely
      on column stability. Any column rename requires a contract version bump.
    config:
      contract:
        enforced: true
    columns:
      - name: date_day
        data_type: date
        constraints:
          - type: not_null
      - name: team
        data_type: string
        constraints:
          - type: not_null
      - name: health_score
        data_type: float64
        description: "Composite score 0–100. Below 70 = alert."
        constraints:
          - type: not_null
      - name: health_tier
        data_type: string
        description: "healthy | warning | critical"
        constraints:
          - type: not_null
      - name: deployment_count
        data_type: int64
        constraints:
          - type: not_null
      - name: deployments_last_7d
        data_type: int64
        constraints:
          - type: not_null
      - name: avg_lead_time_days
        data_type: float64
      - name: p50_lead_time_days
        data_type: float64
      - name: p95_lead_time_days
        data_type: float64
      - name: ci_run_count
        data_type: int64
        constraints:
          - type: not_null
      - name: ci_failure_count
        data_type: int64
        constraints:
          - type: not_null
      - name: ci_failure_rate
        data_type: float64
      - name: ci_failure_rate_7d_avg
        data_type: float64
      - name: incidents_opened
        data_type: int64
        constraints:
          - type: not_null
      - name: incidents_closed
        data_type: int64
        constraints:
          - type: not_null
      - name: incident_count
        data_type: int64
        constraints:
          - type: not_null
      - name: avg_mttr_hours
        data_type: float64
        constraints:
          - type: not_null
      - name: high_mttr_count
        data_type: int64
        constraints:
          - type: not_null
      - name: avg_precision_at_10
        data_type: float64
        constraints:
          - type: not_null
      - name: drift_failure_rate
        data_type: float64
        constraints:
          - type: not_null
      - name: drift_failure_rate_7d_avg
        data_type: float64
        constraints:
          - type: not_null
      - name: training_run_count
        data_type: int64
        constraints:
          - type: not_null
      - name: model_deployment_count
        data_type: int64
        constraints:
          - type: not_null
      - name: drift_detected_count
        data_type: int64
        constraints:
          - type: not_null
      - name: avg_retrain_response_hours
        data_type: float64
        description: "Genomsnittlig tid (timmar) från drift_detected till retrain_triggered."
        constraints:
          - type: not_null
      - name: fast_retrain_response_count
        data_type: int64
        description: "Antal drift-events med svarstid under 24h den dagen."
        constraints:
          - type: not_null
      - name: slow_retrain_response_count
        data_type: int64
        description: "Antal drift-events med svarstid över 72h den dagen."
        constraints:
          - type: not_null
      - name: score_deploy_freq
        data_type: float64
        constraints:
          - type: not_null
      - name: score_ci_quality
        data_type: float64
        constraints:
          - type: not_null
      - name: score_drift
        data_type: float64
        constraints:
          - type: not_null
      - name: score_lead_time
        data_type: float64
        constraints:
          - type: not_null
      - name: score_mttr
        data_type: float64
        constraints:
          - type: not_null
