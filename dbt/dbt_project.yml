name: ml_platform_metrics
version: "1.0.0"
config-version: 2

profile: ml_platform_metrics

model-paths:  ["models"]
test-paths:   ["tests"]
macro-paths:  ["macros"]
seed-paths:   ["seeds"]
analysis-paths: ["analyses"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  ml_platform_metrics:
    staging:
      +materialized: view
      +schema: staging
      +tags: ["staging"]

    intermediate:
      +materialized: view
      +schema: intermediate
      +tags: ["intermediate"]

    marts:
      +materialized: table
      +schema: marts
      +tags: ["marts"]
      fct_platform_health_daily:
        +contract:
          enforced: true
