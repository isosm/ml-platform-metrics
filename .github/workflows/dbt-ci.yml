# dbt CI — Slim validation on Pull Requests
#
# Två steg:
#   1. dbt parse   — validerar hela projektstrukturen, YAML, refs, macros
#                    kräver INGEN databaskoppling
#   2. dbt compile — genererar SQL för alla modeller, hittar syntax-fel
#                    kräver INGEN databaskoppling
#
# I produktion lägger man till dbt build med GCP-credentials för full test.
# parse + compile fångar 80% av felen på 30 sekunder istället för 3 minuter.

name: dbt CI

on:
  pull_request:
    branches: [main]
    paths:
      - "dbt/**"
      - ".github/workflows/dbt-ci.yml"

jobs:
  dbt-validate:
    name: "dbt parse + compile"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dbt
        run: pip install dbt-bigquery

      - name: dbt deps
        run: dbt deps --project-dir dbt --profiles-dir dbt

      - name: dbt parse (validerar struktur utan DB)
        run: dbt parse --project-dir dbt --profiles-dir dbt --target dev

      - name: dbt compile (genererar SQL utan DB)
        run: dbt compile --project-dir dbt --profiles-dir dbt --target dev
